<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141218">
    <title>Antigravity Link</title>
    <style>
        /* ── MD3 Dark Baseline Color Tokens ──────────────────────────────── */
        :root {
            --md-bg:          #141218;
            --md-surf-lo:     #1d1b20;
            --md-surf:        #211f26;
            --md-surf-hi:     #2b2930;
            --md-surf-xhi:    #36343b;
            --md-on-surf:     #e6e1e5;
            --md-on-surf-var: #cac4d0;
            --md-outline:     #938f99;
            --md-outline-var: #49454f;
            /* Primary — blue matching Antigravity */
            --md-primary:     #aac7ff;
            --md-on-primary:  #0a305f;
            --md-prim-cont:   #284777;
            --md-on-prim-c:   #d6e3ff;
            /* Error */
            --md-error:       #ffb4ab;
            --md-err-cont:    #93000a;
            /* MD3 Shape tokens */
            --md-r-xs:   4px;
            --md-r-sm:   8px;
            --md-r-md:   12px;
            --md-r-lg:   16px;
            --md-r-xl:   28px;
            --md-r-full: 50px;
            /* MD3 Elevation */
            --md-elev1: 0 1px 2px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.15);
            --md-elev2: 0 1px 2px rgba(0,0,0,.3), 0 4px 8px rgba(0,0,0,.2);
            --md-elev3: 0 4px 8px rgba(0,0,0,.3), 0 8px 16px rgba(0,0,0,.2);
        }

        /* ── Reset ───────────────────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { height: 100%; overflow: hidden; }

        body {
            font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, sans-serif;
            background: var(--md-bg);
            color: var(--md-on-surf);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── MD3 Focus ring ──────────────────────────────────────────────── */
        :focus-visible {
            outline: 3px solid var(--md-primary);
            outline-offset: 2px;
        }

        /* ── MD3 Top App Bar ─────────────────────────────────────────────── */
        .md-top-bar {
            height: 48px;
            background: var(--md-surf-hi);
            display: flex;
            align-items: center;
            padding: 0 2px 0 12px;
            gap: 2px;
            flex-shrink: 0;
            box-shadow: var(--md-elev1);
            z-index: 100;
        }

        #connectivityBadge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px 8px 0;
            flex: 1;
            min-width: 0;
            cursor: pointer;
            border-radius: var(--md-r-full);
        }
        #connectivityBadge:active { background: rgba(255,255,255,.06); }

        #statusDot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--md-outline);
            flex-shrink: 0;
        }

        #statusText {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--md-on-surf-var);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── MD3 Icon Button (44×44 visual, 48px touch target via padding) ── */
        .md-icon-btn {
            width: 44px; height: 44px;
            border-radius: var(--md-r-full);
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            color: var(--md-on-surf-var);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .md-icon-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: currentColor;
            opacity: 0;
            border-radius: inherit;
            pointer-events: none;
            transition: opacity 150ms;
        }
        .md-icon-btn:active::after { opacity: 0.12; }
        .md-icon-btn svg { pointer-events: none; }

        /* ── Chat Area ───────────────────────────────────────────────────── */
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden; /* fallback for older Safari */
            overflow-x: clip;   /* preferred: no scroll-container side effect */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            position: relative;
        }

        #chatContent {
            padding: 16px 16px 8px;
        }

        /* ── Loading State ───────────────────────────────────────────────── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 48px 24px;
            color: var(--md-on-surf-var);
            font-size: 14px;
            letter-spacing: 0.25px;
        }

        .spinner {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid var(--md-outline-var);
            border-top-color: var(--md-primary);
            animation: md-spin 1s linear infinite;
        }
        @keyframes md-spin { to { transform: rotate(360deg); } }

        /* ── Chips Bar (MD3 Assist Chip spec) ────────────────────────────── */
        #nativeStatusBar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--md-surf);
            border-top: 1px solid var(--md-outline-var);
            flex-shrink: 0;
        }

        .control-chip {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 10px;
            border-radius: var(--md-r-full);
            border: 1px solid var(--md-outline-var);
            background: transparent;
            color: var(--md-on-surf-var);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1px;
            gap: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            /* Extend touch target beyond visual bounds */
            -webkit-tap-highlight-color: transparent;
        }
        .control-chip::before {
            content: '';
            position: absolute;
            inset: -8px;
        }
        .control-chip::after {
            content: '';
            position: absolute; inset: 0;
            background: currentColor;
            opacity: 0;
            border-radius: inherit;
            pointer-events: none;
            transition: opacity 150ms;
        }
        .control-chip:active::after { opacity: 0.12; }

        .control-chip .label {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.55;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .control-chip.active {
            background: var(--md-prim-cont);
            border-color: transparent;
            color: var(--md-on-prim-c);
        }

        .stop-chip {
            border-color: rgba(255,180,171,.35);
            background: rgba(147,0,10,.15);
            color: var(--md-error);
        }
        .task-chip {
            border-color: rgba(245,191,80,.3);
            background: rgba(245,158,11,.08);
            color: #fbbf24;
        }
        .walkthrough-chip {
            border-color: rgba(167,139,250,.3);
            background: rgba(124,58,237,.08);
            color: #a78bfa;
        }
        .plan-chip {
            border-color: rgba(52,211,153,.3);
            background: rgba(16,185,129,.08);
            color: #34d399;
        }

        /* ── MD3 Input Bar ───────────────────────────────────────────────── */
        .md-input-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 6px;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            background: var(--md-surf);
            border-top: 1px solid var(--md-outline-var);
            flex-shrink: 0;
        }

        /* MD3 Filled Text Field */
        .md-field-wrap {
            flex: 1;
            background: var(--md-surf-xhi);
            border-radius: var(--md-r-md) var(--md-r-md) var(--md-r-xs) var(--md-r-xs);
            border-bottom: 1.5px solid var(--md-outline);
            display: flex;
            align-items: center;
            padding: 0 10px;
            min-height: 40px;
            transition: border-color 0.15s, border-bottom-width 0.1s;
            min-width: 0;
        }
        .md-field-wrap:focus-within {
            border-bottom: 2px solid var(--md-primary);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--md-on-surf);
            font-family: inherit;
            font-size: 16px;
            line-height: 20px;
            padding: 8px 0;
            resize: none;
            max-height: 140px;
            min-height: 20px;
        }
        #messageInput::placeholder { color: var(--md-outline); }

        /* MD3 Small FAB — send button */
        #sendBtn {
            width: 44px; height: 44px;
            border-radius: var(--md-r-md);
            background: var(--md-prim-cont);
            color: var(--md-on-prim-c);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-elev3);
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        #sendBtn::after {
            content: '';
            position: absolute; inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 150ms;
            pointer-events: none;
        }
        #sendBtn:active::after { opacity: 0.12; }
        #sendBtn:disabled { opacity: 0.38; box-shadow: none; }
        #sendBtn svg { pointer-events: none; }

        /* ── Scroll-to-bottom FAB ────────────────────────────────────────── */
        #scrollToBottom {
            position: fixed;
            bottom: 148px;
            right: 16px;
            width: 40px; height: 40px;
            border-radius: var(--md-r-full);
            background: var(--md-surf-hi);
            border: 1px solid var(--md-outline-var);
            color: var(--md-on-surf);
            font-size: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-elev2);
            cursor: pointer;
            z-index: 200;
        }
        #scrollToBottom.show { display: flex; }

        /* ── MD3 Dialogs (login, instances) ──────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-overlay.show { display: flex; }

        .md-dialog {
            background: var(--md-surf-hi);
            border-radius: var(--md-r-xl);
            padding: 24px;
            width: 90vw;
            max-width: 360px;
            box-shadow: var(--md-elev3);
        }

        .md-dialog-title {
            font-size: 22px;
            font-weight: 500;
            color: var(--md-on-surf);
            margin-bottom: 20px;
        }

        .md-outlined-field {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: 1.5px solid var(--md-outline);
            border-radius: var(--md-r-xs);
            color: var(--md-on-surf);
            font-family: inherit;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .md-outlined-field:focus { border-color: var(--md-primary); border-width: 2px; }
        .md-outlined-field::placeholder { color: var(--md-outline); }

        .md-filled-btn {
            width: 100%;
            padding: 14px;
            background: var(--md-primary);
            border: none;
            border-radius: var(--md-r-full);
            color: var(--md-on-primary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .md-filled-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: #000;
            opacity: 0;
            transition: opacity 150ms;
            pointer-events: none;
        }
        .md-filled-btn:active::after { opacity: 0.12; }

        .md-dialog-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .md-text-btn {
            background: transparent;
            border: none;
            color: var(--md-primary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--md-r-xs);
            min-width: 48px; min-height: 48px;
            display: flex; align-items: center; justify-content: center;
        }

        #instancesList {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 48vh;
            overflow-y: auto;
        }

        /* ── MD3 Bottom Sheets ───────────────────────────────────────────── */
        #sheetOverlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            display: none;
            z-index: 2000;
        }
        #sheetOverlay.show { display: block; }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--md-surf-lo);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            box-shadow: var(--md-elev3);
            z-index: 2001;
            transform: translateY(100%);
            /* MD3 emphasized-decelerate easing */
            transition: transform 0.3s cubic-bezier(0.05, 0.7, 0.1, 1.0);
            max-height: 72vh;
            display: flex;
            flex-direction: column;
        }
        .bottom-sheet.show { transform: translateY(0); }

        /* MD3 drag handle */
        .bottom-sheet::before {
            content: '';
            display: block;
            width: 32px; height: 4px;
            background: var(--md-outline-var);
            border-radius: 2px;
            margin: 12px auto 0;
            flex-shrink: 0;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
            flex-shrink: 0;
        }

        .sheet-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--md-on-surf);
            letter-spacing: 0.15px;
        }

        .sheet-close {
            width: 40px; height: 40px;
            border-radius: var(--md-r-full);
            background: transparent;
            border: none;
            color: var(--md-on-surf-var);
            font-size: 22px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .sheet-close:active { background: rgba(202,196,208,.12); }

        .sheet-list {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 max(16px, env(safe-area-inset-bottom));
        }

        /* MD3 List item */
        .option-item {
            min-height: 56px;
            padding: 12px 20px;
            color: var(--md-on-surf);
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }
        .option-item::after {
            content: '';
            position: absolute; inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 150ms;
            pointer-events: none;
        }
        .option-item:active::after { opacity: 0.08; }

        .content-sheet-body {
            flex: 1;
            padding: 12px 20px max(20px, env(safe-area-inset-bottom));
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.7;
            color: var(--md-on-surf);
            -webkit-overflow-scrolling: touch;
            word-break: break-word;
        }

        /* ── Click ripple (visual feedback for mirror taps) ──────────────── */
        .click-ripple {
            position: fixed;
            width: 28px; height: 28px;
            background: rgba(170,199,255,.55);
            border-radius: 50%;
            pointer-events: none;
            animation: click-ripple-kf 0.5s ease-out forwards;
            z-index: 9999;
        }
        @keyframes click-ripple-kf {
            0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
            100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
        }

        /* ── Debug Log ───────────────────────────────────────────────────── */
        #debugLog {
            position: fixed;
            top: 72px; left: 12px; right: 12px;
            max-height: 200px;
            background: rgba(0,0,0,.92);
            border-radius: var(--md-r-md);
            border: 1px solid var(--md-outline-var);
            color: #4ade80;
            font-family: 'Roboto Mono', 'Consolas', monospace;
            font-size: 10px;
            padding: 8px;
            overflow-y: auto;
            z-index: 9000;
            display: none;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- MD3 Top App Bar -->
    <header class="md-top-bar">
        <div id="connectivityBadge" role="status" aria-live="polite" aria-label="Connection status">
            <div id="statusDot" aria-hidden="true"></div>
            <span id="statusText">CONNECTING</span>
        </div>
        <button class="md-icon-btn" id="instancesBtn"
            aria-label="Switch active instance" data-i18n-aria="ariaSwitchInstance">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect width="14" height="10" x="2" y="3" rx="2"/>
                <path d="M8 21h8m-4-4v4"/>
                <rect width="8" height="6" x="14" y="11" rx="1"/>
            </svg>
        </button>
    </header>

    <!-- Chat Mirror Area -->
    <main id="chatContainer">
        <div id="chatContent"
            role="region" aria-live="polite"
            aria-label="Antigravity conversation"
            data-i18n-aria="ariaConversation">
            <div class="loading">
                <div class="spinner" aria-hidden="true"></div>
                <span data-i18n="initializing">Initializing...</span>
            </div>
        </div>
    </main>

    <!-- MD3 Chips / Control Bar -->
    <nav id="nativeStatusBar" aria-label="Controls">
        <div id="modeChip" class="control-chip" role="button" tabindex="0"
            aria-label="Change mode" data-i18n-aria="ariaChangeMode">
            <span class="label" data-i18n="chipMode">MODE</span>
            <span id="modeVal">...</span>
        </div>
        <div id="modelChip" class="control-chip" role="button" tabindex="0"
            aria-label="Change model" data-i18n-aria="ariaChangeModel">
            <span class="label" data-i18n="chipModel">MODEL</span>
            <span id="modelVal">...</span>
        </div>
        <div id="stopChip" class="control-chip stop-chip" role="button" tabindex="0"
            aria-label="Stop generation" data-i18n-aria="ariaStopGeneration" style="display:none">
            <span data-i18n="chipStop">&#9632; STOP</span>
        </div>
        <div id="taskChip" class="control-chip task-chip" role="button" tabindex="0"
            aria-label="View task" data-i18n-aria="ariaViewTask">
            <span class="label" data-i18n="chipTaskLabel">TASK</span>
            <span id="taskVal" data-i18n="chipTaskValue">Task</span>
        </div>
        <div id="walkthroughChip" class="control-chip walkthrough-chip" role="button" tabindex="0"
            aria-label="View walkthrough guide" data-i18n-aria="ariaViewGuide">
            <span class="label" data-i18n="chipGuideLabel">GUIDE</span>
            <span id="walkthroughVal" data-i18n="chipGuideValue">Walkthrough</span>
        </div>
        <div id="planChip" class="control-chip plan-chip" role="button" tabindex="0"
            aria-label="View implementation plan" data-i18n-aria="ariaViewPlan">
            <span class="label" data-i18n="chipPlanLabel">PLAN</span>
            <span data-i18n="chipPlanValue">View Plan</span>
        </div>
    </nav>

    <!-- MD3 Input Bar -->
    <div class="md-input-bar">
        <button id="uploadBtn" class="md-icon-btn"
            aria-label="Upload file" data-i18n-aria="ariaUploadFile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <button id="micBtn" class="md-icon-btn"
            aria-label="Voice input" data-i18n-aria="ariaVoiceInput">
            <svg id="micIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
        </button>
        <input type="file" id="fileInput" style="display:none" aria-hidden="true">
        <div class="md-field-wrap">
            <textarea id="messageInput"
                rows="1"
                aria-label="Message input"
                data-i18n-aria="ariaMessageInput"
                aria-multiline="true"></textarea>
        </div>
        <button id="sendBtn" aria-label="Send message" data-i18n-aria="ariaSendMessage">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <!-- Scroll-to-bottom FAB -->
    <button id="scrollToBottom"
        aria-label="Scroll to bottom" data-i18n-aria="ariaScrollToBottom">↓</button>

    <!-- Login Dialog -->
    <div class="modal-overlay" id="loginModal"
        role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <div class="md-dialog">
            <h2 class="md-dialog-title" id="loginTitle" data-i18n="identityTitle">🔐 Identity</h2>
            <input type="password" class="md-outlined-field" id="tokenInput"
                placeholder="Access Token" autocomplete="off"
                data-i18n-placeholder="accessToken" aria-label="Access token">
            <button class="md-filled-btn" id="loginBtn" data-i18n="authorize">Authorize</button>
        </div>
    </div>

    <!-- Instances Dialog -->
    <div class="modal-overlay" id="instancesModal"
        role="dialog" aria-modal="true" aria-labelledby="instancesTitle">
        <div class="md-dialog">
            <div class="md-dialog-row">
                <h3 class="md-dialog-title" id="instancesTitle"
                    style="margin:0;font-size:20px;"
                    data-i18n="activeInstances">Active Instances</h3>

        function t(key) {
            const lang = navigator.language || 'en';
            const exact = STRINGS[lang];
            if (exact && exact[key] !== undefined) return exact[key];
            // Try language prefix (e.g. 'zh' from 'zh-HK')
            const prefix = lang.split('-')[0];
            const prefixMatch = STRINGS[prefix] || STRINGS[prefix.toLowerCase()];
            if (prefixMatch && prefixMatch[key] !== undefined) return prefixMatch[key];
            // Also try common regional variants
            if (lang.toLowerCase().startsWith('zh')) {
                const cn = STRINGS['zh-CN'];
                if (cn && cn[key] !== undefined) return cn[key];
            }
            if (lang.toLowerCase().startsWith('pt')) {
                const pt = STRINGS['pt'];
                if (pt && pt[key] !== undefined) return pt[key];
            }
            return STRINGS.en[key] !== undefined ? STRINGS.en[key] : key;
        }

        const RTL_LANGS = ['ar', 'he', 'fa', 'ur'];

        // Scroll chatContainer to show the last real content element in the shadow DOM.
        //
        // Two problems with earlier approaches:
        //   1. Walking all elements could match a CONTAINER whose rect.bottom includes
        //      blank trailing space (padding, flex spacers, uncollapsed vh containers).
        //   2. Only scrolling down (delta > 0) means an overshoot into blank space is
        //      never corrected — the user has to manually scroll back up.
        //
        // Fix: prefer LEAF elements (no child elements) whose bounding rect is tight,
        // fall back to any element only if no leaf with text is found.  Always apply
        // the delta (positive = scroll down, negative = scroll up) so the position is
        // corrected in both directions.  This function is only called when the user was
        // already near the bottom, so correcting upward is always the right move.
        function scrollToLastContent() {
            if (!mirrorHost || !mirrorHost.shadowRoot) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return;
            }
            const contentEl = mirrorHost.shadowRoot.getElementById('mirrorContent');
            if (!contentEl) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return;
            }

            const all = contentEl.querySelectorAll('*');
            const cRect = chatContainer.getBoundingClientRect();

            // Pass 1: leaf elements only — tight bounding rects, no trailing blank space
            for (let i = all.length - 1; i >= 0; i--) {
                const el = all[i];
                if (el.children.length > 0) continue;       // skip containers
                if (!el.textContent.trim()) continue;
                const cs = getComputedStyle(el);
                if (cs.display === 'none' || cs.visibility === 'hidden') continue;
                const rect = el.getBoundingClientRect();
                if (rect.height > 0 && rect.width > 0) {
                    chatContainer.scrollTop += rect.bottom - cRect.bottom + 20;
                    return;
                }
            }

            // Pass 2: any element with text (fallback if no leaf found)
            for (let i = all.length - 1; i >= 0; i--) {
                const el = all[i];
                if (!el.textContent.trim()) continue;
                const cs = getComputedStyle(el);
                if (cs.display === 'none' || cs.visibility === 'hidden') continue;
                const rect = el.getBoundingClientRect();
                if (rect.height > 0 && rect.width > 0) {

                    return;
                }

        }

        function normalizeInlineText(value) {

        function toFallbackLabel(value) {
            const label = normalizeInlineText(value).toLowerCase();
            if (!label) return '';
            if (/(thumb|like|good|up)/.test(label)) return 'Up';
            if (/(down|dislike|bad)/.test(label)) return 'Down';
            if (/(copy|duplicate)/.test(label)) return 'Copy';
            if (/(typescript|type script|\bts\b)/.test(label)) return 'TS';
            if (/(retry|regenerate|refresh)/.test(label)) return 'Retry';
            if (/(open)/.test(label)) return 'Open';
            if (/(close)/.test(label)) return 'Close';
            return label.split(' ').slice(0, 2).join(' ').slice(0, 12);
        }

                const hasGraphicChild = !!el.querySelector('svg, img, [class*="icon"], [class*="codicon"]');

            if (!cssText) return '';

                if (!isLocalAssetUrl(value)) return full;

            out = out.replace(/style\s*=\s*(['"])([\s\S]*?)\1/gi, (full, quote, styleValue) => {
                const safeStyle = sanitizeSnapshotCss(styleValue);

                    height: auto !important;
                    min-height: 0 !important;
                    max-height: none !important;
                    overflow: visible !important;
                }

                /* Unconditional collapse of the top-level cascade element regardless of
                   ID/class.  mirrorContent's direct child is always the captured root
                   (cascade div or body fallback).  Its first two levels of children are
                   layout wrappers that inherit the VS Code panel's fixed viewport height.
                   Collapsing them here ensures natural document flow in the mirror even
                   when CHAT_SURFACE selectors don't match the running Antigravity version. */
                #mirrorContent > *,
                #mirrorContent > * > * {
                    height: auto !important;
                    min-height: 0 !important;
                    max-height: none !important;
                    overflow-y: visible !important;
                    flex-grow: 0 !important;
                    flex-shrink: 0 !important;
                    flex-basis: auto !important;
                }

                /* ── Mobile viewport compliance (:host * — unconditional) ────────────────
                   Applied to ALL shadow DOM children so viewport width is enforced
                   regardless of whether ${CHAT_SURFACE} matches the cascade element.
                   word-break/overflow-wrap prevent long tokens (URLs, identifiers, hashes)
                   from pushing layout wider than 100vw. */
                :host * {
                    max-width: 100% !important;
                    min-width: 0 !important;
                    word-break: break-word;
                    overflow-wrap: break-word;
                }

                /* pre/code: scroll horizontally rather than wrap, override the above */
                :host pre, :host code {
                    overflow-x: auto !important;
                    overflow-wrap: anywhere !important;
                    word-break: normal !important;
                    white-space: pre;
                    -webkit-overflow-scrolling: touch;
                }

                ${CHAT_SURFACE} img,
                ${CHAT_SURFACE} svg,
                ${CHAT_SURFACE} video {
                    max-width: 100%;
                }

                ${CHAT_SURFACE} pre,
                ${CHAT_SURFACE} code,
                ${CHAT_SURFACE} table {
                    max-width: 100%;
                }

                ${CHAT_SURFACE} pre,
                ${CHAT_SURFACE} code {
                    overflow-x: auto !important;
                    overflow-wrap: anywhere !important;
                    word-break: normal !important;
                    -webkit-overflow-scrolling: touch;
                }

                ${CHAT_SURFACE} table {
                    display: block;
                    overflow-x: auto;
                }

                ${CHAT_SURFACE} button,
                ${CHAT_SURFACE} [role="button"] {
                    touch-action: manipulation;
                }

                ${CHAT_SURFACE} button svg,
                ${CHAT_SURFACE} [role="button"] svg {
                    width: 1rem !important;
                    height: 1rem !important;
                    min-width: 1rem !important;
                    min-height: 1rem !important;
                    max-width: 1rem !important;
                    max-height: 1rem !important;
                    flex: 0 0 auto;
                }

                ${CHAT_SURFACE} button.ag-fallback-label,
                ${CHAT_SURFACE} [role="button"].ag-fallback-label {
                    display: inline-flex !important;
                    align-items: center;
                    justify-content: center;
                    min-width: 30px;
                    min-height: 26px;
                    padding: 4px 8px;
                    line-height: 1.1;
                }

                ${CHAT_SURFACE} .ag-fallback-label > * {
                    display: none !important;
                }

                ${CHAT_SURFACE} .ag-fallback-label::after {
                    content: attr(data-ag-fallback-label);
                    font-size: 0.7rem;
                    font-weight: 600;
                    opacity: 0.95;
                }

                ${CHAT_SURFACE} button[aria-label*="good" i] svg,
                ${CHAT_SURFACE} button[aria-label*="bad" i] svg,
                ${CHAT_SURFACE} button[aria-label*="thumb" i] svg,
                ${CHAT_SURFACE} [role="button"][aria-label*="good" i] svg,
                ${CHAT_SURFACE} [role="button"][aria-label*="bad" i] svg,
                ${CHAT_SURFACE} [role="button"][aria-label*="thumb" i] svg {
                    width: 18px !important;
                    height: 18px !important;
                    min-width: 18px !important;
                    min-height: 18px !important;
                    max-width: 18px !important;
                    max-height: 18px !important;
                }

                /* ── Thumb / reaction button containers ──────────────────────────────────
                   Source CSS sometimes gives thumb buttons explicit large dimensions after
                   a context switch.  Force them to wrap tightly around their icon so the
                   button itself never balloons. */
                ${CHAT_SURFACE} button[aria-label*="good" i],
                ${CHAT_SURFACE} button[aria-label*="bad" i],
                ${CHAT_SURFACE} button[aria-label*="thumb" i],
                ${CHAT_SURFACE} [role="button"][aria-label*="good" i],
                ${CHAT_SURFACE} [role="button"][aria-label*="bad" i],
                ${CHAT_SURFACE} [role="button"][aria-label*="thumb" i] {
                    width: auto !important;
                    height: auto !important;
                    min-width: 0 !important;
                    min-height: 0 !important;
                    padding: 4px !important;
                    display: inline-flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    flex: 0 0 auto !important;
                }

                @media (max-width: 900px) {
                    ${CHAT_SURFACE} {
                        font-size: 14px;
                        line-height: 1.45;
                    }

                    ${CHAT_SURFACE} button,
                    ${CHAT_SURFACE} [role="button"] {
                        font-size: 12px;
                        min-height: 28px;
                    }
                }
            `;
        }

        function buildRescueStyles(data, bodyColor) {
            const scheme = String(data.colorScheme || 'dark');
            const fg = bodyColor || '#e0e0e0';
            return `
                :host {
                    display: block;
                    width: 100%;
                    color: ${fg};
                    background: transparent;
                    color-scheme: ${scheme};
                }

                :host, :host *, :host *::before, :host *::after {
                    box-sizing: border-box;
                }

                ${CHAT_SURFACE},
                ${CHAT_SURFACE} * {
                    color: ${fg} !important;
                }

                ${CHAT_SURFACE} {
                    background: transparent !important;
                    position: static !important;
                    inset: auto !important;
                    transform: none !important;
                    width: 100% !important;
                    max-width: 100% !important;
                    opacity: 1 !important;
                    visibility: visible !important;
                    display: block !important;
                }

                ${CHAT_SURFACE} img, ${CHAT_SURFACE} svg {
                    max-width: 100%;
                }

                ${CHAT_SURFACE} pre, ${CHAT_SURFACE} code {
                    background-color: #1e1e1e !important;
                    color: #d4d4d4 !important;
                }

                ${CHAT_SURFACE} button svg,
                ${CHAT_SURFACE} [role="button"] svg {
                    width: 1rem;
                    height: 1rem;
                }
            `;
        }

        function syncMirrorThemeVars() {
            if (!mirrorHost) return;
            try {
                const src = getComputedStyle(document.documentElement);
                for (let i = 0; i < src.length; i += 1) {
                    const name = src[i];
                    if (name && name.startsWith('--vscode-')) {
                        mirrorHost.style.setProperty(name, src.getPropertyValue(name));
                    }
                }
            } catch { }
        }

        function hasVisibleChatSurface(root) {
            if (!root) return false;
            const surface = root.querySelector(CHAT_SURFACE_SELECTOR);
            if (!surface) return false;
            const textLen = normalizeInlineText(surface.textContent || '').length;
            const hasContentNodes = !!surface.querySelector('[data-message-id], [data-testid*="message" i], article, p, pre, code, button');
            return textLen > 0 || hasContentNodes;
        }

        function ensureMirrorRoot() {
            if (!mirrorHost || !mirrorHost.isConnected) {
                mirrorHost = document.getElementById('snapshotHost');
                if (!mirrorHost) {
                    chatContent.innerHTML = '';
                    mirrorHost = document.createElement('div');
                    mirrorHost.id = 'snapshotHost';
                    mirrorHost.style.width = '100%';
                    mirrorHost.style.overflowX = 'clip';
                    mirrorHost.style.minHeight = '1px';
                    chatContent.appendChild(mirrorHost);
                }
            }

            if (!mirrorHost.shadowRoot) {
                mirrorHost.attachShadow({ mode: 'open' });
            }

            mirrorRoot = mirrorHost.shadowRoot;

            // Auto-scroll on content mutations. Uses scrollToLastContent() which finds
            // the last real element via getBoundingClientRect — avoids blank-space overshoot.
            if (!mirrorHost._scrollObserver) {
                const obs = new MutationObserver(() => {
                    const gap = chatContainer.scrollHeight - chatContainer.clientHeight - chatContainer.scrollTop;
                    if (gap <= 120) requestAnimationFrame(scrollToLastContent);
                });
                obs.observe(mirrorRoot, { childList: true, subtree: true });
                mirrorHost._scrollObserver = obs;
            }
            if (!boundClickRoots.has(mirrorRoot)) {
                mirrorRoot.addEventListener('click', forwardSnapshotClick);
                boundClickRoots.add(mirrorRoot);
            }

            if (!mirrorRoot.getElementById('mirrorStyle')) {
                const styleEl = document.createElement('style');
                styleEl.id = 'mirrorStyle';
                mirrorRoot.appendChild(styleEl);
            }

            if (!mirrorRoot.getElementById('mirrorContent')) {
                const contentEl = document.createElement('div');
                contentEl.id = 'mirrorContent';
                mirrorRoot.appendChild(contentEl);
            }

            return mirrorRoot;
        }

        // Check URL for token immediately (QR code login)
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');

        if (urlToken) {
            authToken = urlToken;
            localStorage.setItem('ag_auth_token', urlToken);
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Show login if needed
        function checkAuth() {
            if (!authToken) {
                showLogin();
                return false;
            }
            return true;
        }

        function showLogin() {
            loginModal.classList.add('show');
            tokenInput.focus();
        }

        function handleLogin() {
            const token = tokenInput.value.trim();
            if (token) {
                authToken = token;
                localStorage.setItem('ag_auth_token', token);
                loginModal.classList.remove('show');
                // Reconnect
                if (ws && ws.readyState !== WebSocket.CLOSED) {
                    suppressReconnectOnce = true;
                    ws.close(1000, 'manual_reauth');
                }
                connectWebSocket();
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        tokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Render snapshot
        function renderSnapshot(data) {
            const scrollPos = chatContainer.scrollTop;
            const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100;

            // Check if pending message appeared in snapshot (visual confirmation)
            if (pendingMessage && data.html && data.html.includes(pendingMessage.slice(0, 50))) {
                messageInput.value = '';
                autoResizeInput();
                pendingMessage = null;
            }

            // Apply Antigravity's theme class to our html element
            if (data.themeClass) {
                document.documentElement.className = data.themeClass;
            }
            if (data.themeAttr) {
                document.documentElement.setAttribute('data-theme', data.themeAttr);
            }

            // Apply body background and color from Antigravity
            const rawBodyBg = String(data.bodyBg || '').trim();
            const transparentBg = !rawBodyBg ||
                rawBodyBg.toLowerCase() === 'transparent' ||
                /rgba?\(\s*0\s*,\s*0\s*,\s*0\s*,\s*0\s*\)/i.test(rawBodyBg);
            const bodyBg = transparentBg ? '#1a1a1a' : rawBodyBg;
            let bodyColor = String(data.bodyColor || '').trim() || '#e0e0e0';
            if (transparentBg && /^rgb\(\s*0\s*,\s*0\s*,\s*0\s*\)$/i.test(bodyColor)) {
                bodyColor = '#e0e0e0';
            }
            document.body.style.backgroundColor = bodyBg;
            document.body.style.color = bodyColor;

            const root = ensureMirrorRoot();
            const styleEl = root.getElementById('mirrorStyle');
            const contentEl = root.getElementById('mirrorContent');

            const safeCss = sanitizeSnapshotCss(String(data.css || ''));
            const safeHtml = sanitizeSnapshotHtml(String(data.html || ''));

            const cssSig = [
                String(data.themeClass || ''),
                String(data.themeAttr || ''),
                String(data.colorScheme || ''),
                String(safeCss).length
            ].join('|');

            if (cssSig !== mirrorStyleSignature) {
                styleEl.textContent = buildMirrorStyles({ ...data, css: safeCss }, bodyColor);
                mirrorStyleSignature = cssSig;
                syncMirrorThemeVars();
            }

            const themeClass = String(data.themeClass || '').trim();
            contentEl.className = themeClass;
            const themeAttr = String(data.themeAttr || '').trim();
            if (themeAttr) contentEl.setAttribute('data-theme', themeAttr);
            else contentEl.removeAttribute('data-theme');
            contentEl.innerHTML = safeHtml;
            applyIconFallbacks(root);
            if (!hasVisibleChatSurface(root)) {
                styleEl.textContent = buildRescueStyles({ ...data, css: safeCss }, bodyColor);
                mirrorStyleSignature = `rescue|${cssSig}`;
                applyIconFallbacks(root);
                if (typeof logToScreen === 'function') {
                    logToScreen('UI rescue mode enabled (source CSS hid chat surface).', '#fbbf24');
                }
            }

            const doScrollToBottom = scrollToLastContent;

            if (!initialScrollDone) {
                initialScrollDone = true;
                // Two-stage: first RAF lets shadow DOM mount, second measures, setTimeout
                // handles any reflow triggered by style recalculation.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        doScrollToBottom();
                        setTimeout(doScrollToBottom, 80);
                    });
                });
            } else if (isNearBottom || scrollPos === 0) {
                requestAnimationFrame(doScrollToBottom);
            } else {
                chatContainer.scrollTop = scrollPos;
            }
        }

        const connectivityBadge = document.getElementById('connectivityBadge');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const debugLog = document.getElementById('debugLog');

        function logToScreen(msg, color = '#aaa') {
            console.log(`[LOG] ${msg}`);
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugLog.insertBefore(line, debugLog.firstChild);
        }

        connectivityBadge.addEventListener('click', () => {
            debugLog.style.display = debugLog.style.display === 'none' ? 'block' : 'none';
        });

        function updateConnectionUI(mode) {
            statusText.textContent = mode.toUpperCase();
            if (mode === 'ws') {
                statusDot.style.background = '#4ade80'; // Green
                statusText.style.color = '#4ade80';
            } else if (mode === 'http') {
                statusDot.style.background = '#fbbf24'; // Amber
                statusText.style.color = '#fbbf24';
            } else if (mode === 'offline') {
                statusDot.style.background = '#f87171'; // Red
                statusText.style.color = '#f87171';
            } else {
                statusDot.style.background = '#aaa';
                statusText.style.color = '#aaa';
            }
        }

        let pollingInterval = null;
        function startHttpPolling() {
            if (pollingInterval) return;
            logToScreen('Switching to HTTP Polling Mode', '#fbbf24');
            updateConnectionUI('http');

            const poll = async () => {
                try {
                    const res = await fetch('/snapshot', {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    if (res.status === 401) {
                        authToken = '';
                        localStorage.removeItem('ag_auth_token');
                        showLogin();
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        return;
                    }
                    if (res.ok) {
                        const data = await res.json();
                        lastSnapshotData = data;
                        renderSnapshot(data);
                        updateControls(data);
                    } else if (res.status === 503) {
                        const loader = document.querySelector('.loading span');
                        if (loader) loader.textContent = 'Connected. Waiting for chat surface...';
                    }
                } catch (e) {
                    logToScreen(`HTTP Poll Fail: ${e.message}`, '#f87171');
                    const loader = document.querySelector('.loading span');
                    if (loader) loader.textContent = 'Connected. Retrying...';
                }
            };

            poll();
            pollingInterval = setInterval(poll, 3000);
        }

        // WebSocket connection
        function connectWebSocket() {
            if (pollingInterval) return; // Already in polling mode

            // Dynamic protocol based on page load
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}?token=${encodeURIComponent(authToken)}`;

            logToScreen(`Connecting via ${protocol}...`);
            updateConnectionUI('connecting');

            ws = new WebSocket(wsUrl);

            async function recoverIfStalled() {
                try {
                    const loader = document.querySelector('.loading span');
                    const isStalled = !!loader && /authenticating|waiting for chat surface/i.test(loader.textContent || '');
                    if (!isStalled) return;

                    const snapshotRes = await fetch('/snapshot', {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    if (snapshotRes.ok) {
                        const data = await snapshotRes.json();
                        lastSnapshotData = data;
                        renderSnapshot(data);
                        updateControls(data);
                        return;
                    }

                    const instancesRes = await fetch('/instances', {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    if (!instancesRes.ok) return;
                    const data = await instancesRes.json();
                    const fallbackTargetId = data.activeTargetId || (Array.isArray(data.instances) && data.instances[0] ? data.instances[0].id : '');
                    if (fallbackTargetId) {
                        await switchInstance(fallbackTargetId);
                    }
                } catch (e) {
                    logToScreen(`Recover check failed: ${e.message}`, '#f87171');
                }
            }

            // Watchdog: If no snapshot or WS open in 5s, fall back to HTTP
            const watchdog = setTimeout(() => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    logToScreen('WS Connection Timed Out. Falling back to HTTP.', '#fbbf24');
                    if (ws) ws.close();
                    startHttpPolling();
                }
            }, 5000);

            ws.onopen = async () => {
                clearTimeout(watchdog);
                logToScreen('WebSocket Connected', '#4ade80');
                updateConnectionUI('ws');

                const loader = document.querySelector('.loading span');
                if (loader) loader.textContent = 'Authenticating...';

                // Auto-connect / Wake-up Logic
                try {
                    const res = await fetch('/instances', { headers: { 'Authorization': `Bearer ${authToken}` } });
                    if (res.ok) {
                        const data = await res.json();
                        if (!data.activePort && data.instances.length > 0) {
                            if (loader) loader.textContent = 'Auto-connecting...';
                            await switchInstance(data.instances[0].id);
                            return;
                        }
                    }
                } catch (e) {
                    logToScreen(`Auto-connect check failed: ${e.message}`);
                }

                ws.send(JSON.stringify({ type: 'request_snapshot' }));

                // If no snapshot arrives quickly, surface actionable state instead of hanging on "Authenticating..."
                setTimeout(() => {
                    const loadingEl = document.querySelector('.loading span');
                    if (loadingEl && /authenticating/i.test(loadingEl.textContent || '')) {
                        loadingEl.textContent = 'Connected. Waiting for chat surface...';
                    }
                }, 5000);

                // Recovery path: try pulling snapshot/instances if UI still stalled.
                setTimeout(recoverIfStalled, 6500);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'snapshot' && msg.data) {
                        lastSnapshotData = msg.data;
                        if (!userIsScrolling) {
                            renderSnapshot(msg.data);
                        }
                        // updateControls must always run (updates chips + menu detection)
                        // even while the user is scrolling — it does not touch the mirror DOM.
                        updateControls(msg.data);
                    }
                } catch (e) {
                    logToScreen(`Message Parse Error: ${e.message}`, '#f87171');
                }
            };

            ws.onclose = (event) => {
                clearTimeout(watchdog);
                const reason = event.code === 1008 ? 'Auth Failed' : (event.code === 1006 ? 'Abnormal Closure' : `Closed (${event.code})`);
                logToScreen(`WS Disconnected: ${reason}`);

                if (suppressReconnectOnce) {
                    suppressReconnectOnce = false;
                    return;
                }

                if (event.code === 1008) {
                    authToken = '';
                    localStorage.removeItem('ag_auth_token');
                    showLogin();
                } else if (event.code === 1006) {
                    // Critical Abnormal Closure (often SSL/Network relates) - fallback immediately
                    startHttpPolling();
                } else {
                    updateConnectionUI('offline');
                    setTimeout(connectWebSocket, 2000);
                }
            };

            ws.onerror = (e) => {
                logToScreen('WS Network Error', '#f87171');
                ws.close();
            };
        }

        // Send message
        async function sendMessage() {
            if (!checkAuth()) return;

            const message = messageInput.value.trim();
            if (!message) return;

            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            try {
                const res = await fetch('/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ message })
                });

                if (res.status === 401) {
                    authToken = '';
                    localStorage.removeItem('ag_auth_token');
                    showLogin();
                    throw new Error('Unauthorized');
                }

            } catch (e) {
                console.error(e);
            } finally {
                // Always clear textarea after send attempt
                messageInput.value = '';
                autoResizeInput(); // Reset to min-height
                sendBtn.disabled = false;
                sendBtn.innerHTML = sendBtnOriginalIcon;
            }
        }

        // Scroll handling
        let scrollTimeout;
        chatContainer.addEventListener('scroll', () => {
            userIsScrolling = true;
            clearTimeout(scrollTimeout);

            const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100;
            scrollToBottomBtn.classList.toggle('show', !isNearBottom);

            scrollTimeout = setTimeout(() => {
                userIsScrolling = false;
            }, 500);
        });

        scrollToBottomBtn.addEventListener('click', () => {
            scrollToLastContent();
        });

        // Stop generation via dedicated /stop endpoint.
        // The server uses CancelCascadeInvocation (LS RPC) as the primary mechanism
        // and falls back to DOM click using the last-seen stop selector.
        async function stopGeneration() {
            const chip = document.getElementById('stopChip');
            const btn = sendBtn?._isStopMode ? sendBtn : null;
            const originalChipHtml = chip?.innerHTML;
            const originalBtnHtml = btn?.innerHTML;
            if (chip) { chip.style.opacity = '0.5'; chip.style.pointerEvents = 'none'; }
            if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
            try {
                await fetch('/stop', {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${authToken}` }
                });
            } catch { /* best-effort */ } finally {
                if (chip) { chip.style.opacity = ''; chip.style.pointerEvents = ''; }
                if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
            }
        }

        // Input handlers
        sendBtn.addEventListener('click', () => {
            if (sendBtn._isStopMode) {
                stopGeneration();
            } else {
                sendMessage();
            }
        });
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // File Upload Logic
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            // Preflight size check (50MB hard limit to match server)
            const MAX_SIZE_MB = 50;
            if (file.size > MAX_SIZE_MB * 1024 * 1024) {
                alert(`File is too large (${(file.size / 1024 / 1024).toFixed(1)}MB). Max limit is ${MAX_SIZE_MB}MB.`);
                fileInput.value = '';
                return;
            }
            logToScreen(`Using upload target selector: ${uploadTargetSelector || 'auto-detect'}`, '#999');

            // Visual feedback
            const originalIcon = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '⏳';
            uploadBtn.disabled = true;
            logToScreen(`Uploading: ${file.name} (${(file.size / 1024 / 1024).toFixed(1)}MB)...`, '#3b82f6');

            try {
                const base64Content = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const dataUrl = String(e.target.result || '');
                            resolve(dataUrl.split(',')[1] || '');
                        } catch (readErr) {
                            reject(readErr);
                        }
                    };
                    reader.onerror = () => reject(new Error('Error reading file'));
                    reader.readAsDataURL(file);
                });

                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        name: file.name,
                        content: base64Content,
                        targetSelector: uploadTargetSelector || undefined
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    logToScreen(`Upload success: ${file.name}`, '#4ade80');
                    if (result.injected) {
                        alert(`Uploaded and injected: ${result.path}`);
                    } else {
                        const reason = result.reason || 'could_not_locate_file_input';
                        const msg = `File saved but not injected (${reason}). If you know the file input selector, enter it to retry next time.`;
                        alert(msg);

                    let retries = 0;
                    const maxRetries = 3;
                    const retryDelay = 500;

                    const requestSnapshot = () => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            console.log(`Requesting snapshot (attempt ${retries + 1}/${maxRetries})`);
                            ws.send(JSON.stringify({ type: 'request_snapshot' }));
                        }

                            clearInterval(retryInterval);

        // Helper to generate unique CSS selector
        function getUniqueSelector(el) {
            if (!el) return '';
            if (el.id) return '#' + CSS.escape(el.id);
            // path fallback
            const path = [];
            while (el && el.nodeType === Node.ELEMENT_NODE) {
                let selector = el.nodeName.toLowerCase();
                if (el.id) {
                    selector = '#' + CSS.escape(el.id);
                    path.unshift(selector);
                    break;
                } else {
                    let sib = el, nth = 1;
                    while (sib = sib.previousElementSibling) {
                        if (sib.nodeName.toLowerCase() === selector) nth++;
                    }
                    if (nth != 1) selector += ":nth-of-type(" + nth + ")";
                }
                path.unshift(selector);
                el = el.parentNode;
                if (el instanceof ShadowRoot) {
                    break;
                }
            }
            return path.join(' > ');
        }

        // Click Forwarding Logic
        async function forwardSnapshotClick(e) {
            if (!authToken) return;

            // During generation, tapping anything in the mirror near the input box area
            // risks clicking the mic button (which sits next to the cancel button). Route
            // all mirror taps to stopGeneration() instead of forwarding as raw CDP clicks.
            if (lastSnapshotData?.isGenerating) {
                e.preventDefault();
                e.stopPropagation();
                stopGeneration();
                return;
            }

            let target = e.target;
            if (!target || !(target instanceof Element)) return;
            if (target.id === 'snapshotHost') return;

            let interactive = target;
            while (interactive && interactive !== chatContent && interactive.id !== 'snapshotHost') {
                const tag = interactive.tagName.toLowerCase();
                if (tag === 'button' || tag === 'a' || interactive.getAttribute('role') === 'button') {
                    target = interactive;
                    break;
                }

                if (interactive.parentElement) {
                    interactive = interactive.parentElement;
                } else {
                    const rootNode = interactive.getRootNode ? interactive.getRootNode() : null;
                    interactive = rootNode instanceof ShadowRoot ? rootNode.host : null;
                }
            }

            const text = target.getAttribute('data-ag-original-text') || target.innerText || target.textContent || '';
            const tag = target.tagName.toLowerCase();
            const selector = getUniqueSelector(target);

            // Ignore container clicks
            if (tag === 'div' && target.id === 'chatContent') return;
            if (target.id === 'snapshotHost') return;

            console.log(`Click: "${text}" <${tag}> [${selector}]`);

            // 2. Visual Feedback (Ripple effect)
            const rect = target.getBoundingClientRect();
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);

            setTimeout(() => ripple.remove(), 1000);

            // 3. Send to server
            try {
                const res = await fetch('/click', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        text: text.substring(0, 50),
                        tag: tag,
                        selector: selector,
                        x: Math.round(e.clientX),
                        y: Math.round(e.clientY)
                    })
                });

                if (res.ok) {
                    console.log('Click sent successfully');
                } else {
                    console.warn('Click failed on server');
                }
            } catch (err) {
                console.error('Network error sending click:', err);
            }
        }

        function normalizeControlText(value) {

        function isCommandPaletteOption(text) {
            const t = normalizeControlText(text).toLowerCase();
            if (!t) return false;
            if (/^[a-z][a-z0-9 ._-]{1,40}:\s/.test(t) && !/^(gpt|claude|gemini|llama|deepseek)\b/.test(t)) return true;
            return (
                t.startsWith('developer:') ||

                t === 'chat' || t === 'code' || t === 'edit' || t === 'execution' ||
                t === 'execute' || t === 'writing' ||

                t === 'ask mode' || t === 'chat mode' || t === 'code mode' ||
                t === 'edit mode' || t === 'execution mode' || t === 'execute mode' ||
                t === 'writing mode'

        function isModelLikeLabel(text) {
